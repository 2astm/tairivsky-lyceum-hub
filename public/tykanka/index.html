<!-- ══ HEADER ═══════════════════════════════════════════ -->
<header class="app-header">
    <div class="app-logo">Тика<span>нка</span></div>

        <input id="inp-name" type="text" placeholder="Іван">
        <label for="inp-surname">Прізвище</label>

    </div>
</header>

<!-- ══ NAV ══════════════════════════════════════════════ -->
<nav class="nav-row">
    <button class="btn" onclick="openLessonModal()">Вправи</button>
    <button class="btn" onclick="openProgressModal()">Поступ</button>
    <button class="btn" onclick="openHandsModal()">Постановка рук</button>

    <button class="btn" onclick="openCalibModal()" title="Визначити розкладку клавіатури повторно">Розкладка</button>

<!-- ══ PRE-CALIB MESSAGE (hidden once layout known) ══════ -->
<div id="pre-calib-msg" style="width:100%;max-width:900px;
     background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);
     padding:1.5rem;margin-bottom:1.25rem;text-align:center;">
    <div style="font-size:15px;font-weight:500;color:var(--txt);margin-bottom:8px">Визначення розкладки клавіатури</div>
    <div style="font-size:13px;color:var(--txt-2);line-height:1.7">
        Зачекайте — визначаємо розкладку автоматично…<br>
        Якщо це займає більше кількох секунд, натисніть кнопку <b style="color:var(--txt)">Розкладка</b> у меню вище.
    </div>

<!-- ══ TYPING AREA (hidden until layout ready) ══════════ -->
<div id="typing-area" style="display:none;width:100%;max-width:900px">

        <div class="stat-card"><div class="val" id="stat-errors">0</div><div class="lbl">помилки</div></div>
    </div>

    <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>

    <!-- ══ TASK TEXT ═════════════════════════════════════════ -->
    <div class="task-box" id="task-render"></div>

    <div id="status-msg"></div>

</div><!-- /typing-area -->

        "Вправа 1: в, а, о", "Вправа 2: л", "Вправа 3: д", "Вправа 4: і",
        "Вправа 5: ф", "Вправа 6: ж", "Вправа 7: м", "Вправа 8: т",

    /* ── Telegram bot config ────────────────────────────────── */
    const TG_TOKEN   = '8120809238:AAGTVpgBKD_iH6HgFvLTu_FCctuxoDCYcjM';
    const TG_CHAT_ID = '317175238';

    /* ══════════════════════════════════════════════════════
       KEYBOARD LAYOUT MAPS
       layoutMap: Map<code, key>  — built from calibration or fallback
    ══════════════════════════════════════════════════════ */

    // Fallback Ukrainian (ЙЦУКЕН) layout  code → [normal, shifted]
    const FALLBACK_LAYOUT = {
        Backquote:["'","ʼ"],  Digit1:["1","!"],  Digit2:["2",'"'],  Digit3:["3","№"],
        Digit4:["4",";"],     Digit5:["5","%"],  Digit6:["6",":"],  Digit7:["7","?"],
        Digit8:["8","*"],     Digit9:["9","("],  Digit0:["0",")"],  Minus:["-","_"],
        Equal:["=","+"],
        KeyQ:["й","Й"], KeyW:["ц","Ц"], KeyE:["у","У"], KeyR:["к","К"],
        KeyT:["е","Е"], KeyY:["н","Н"], KeyU:["г","Г"], KeyI:["ш","Ш"],
        KeyO:["щ","Щ"], KeyP:["з","З"], BracketLeft:["х","Х"], BracketRight:["ї","Ї"],
        Backslash:["ґ","Ґ"],
        KeyA:["ф","Ф"], KeyS:["і","І"], KeyD:["в","В"], KeyF:["а","А"],
        KeyG:["п","П"], KeyH:["р","Р"], KeyJ:["о","О"], KeyK:["л","Л"],
        KeyL:["д","Д"], Semicolon:["ж","Ж"], Quote:["є","Є"],
        KeyZ:["я","Я"], KeyX:["ч","Ч"], KeyC:["с","С"], KeyV:["м","М"],
        KeyB:["и","И"], KeyN:["т","Т"], KeyM:["ь","Ь"],
        Comma:["б","Б"], Period:["ю","Ю"], Slash:[".","?"],
        Space:[" "," "],
    };

    // code → DOM key id  (static physical mapping)
    const CODE_TO_ID = {
        Backquote:"tilda", Digit1:"1", Digit2:"2", Digit3:"3", Digit4:"4",
        Digit5:"5", Digit6:"6", Digit7:"7", Digit8:"8", Digit9:"9",
        Digit0:"0", Minus:"minus", Equal:"plus",
        KeyQ:"Q", KeyW:"W", KeyE:"E", KeyR:"R", KeyT:"T",
        KeyY:"Y", KeyU:"U", KeyI:"I", KeyO:"O", KeyP:"P",
        BracketLeft:"lsc", BracketRight:"rsc", Backslash:"bckslash",
        KeyA:"A", KeyS:"S", KeyD:"D", KeyF:"F", KeyG:"G",
        KeyH:"H", KeyJ:"J", KeyK:"K", KeyL:"L",
        Semicolon:"ddot", Quote:"apo",
        KeyZ:"Z", KeyX:"X", KeyC:"C", KeyV:"V", KeyB:"B",
        KeyN:"N", KeyM:"M", Comma:"comma", Period:"dot", Slash:"slash",
        Space:"space",
    };

    // Runtime layout: code → [normal, shifted]
    // Populated by calibration; falls back to FALLBACK_LAYOUT
    let runtimeLayout = { ...FALLBACK_LAYOUT };

    // char → keyId  (rebuilt after each layout update)
    let charToKeyId = {};

    function buildCharMap() {
        charToKeyId = {};
        for (const [code, [lo, hi]] of Object.entries(runtimeLayout)) {
            const id = CODE_TO_ID[code];
            if (!id) continue;
            if (lo && !charToKeyId[lo]) charToKeyId[lo] = id;
            if (hi && !charToKeyId[hi]) charToKeyId[hi] = id;
        }
    }

    function getKeyId(ch) {
        return charToKeyId[ch] ?? charToKeyId[ch?.toLowerCase()] ?? ch;
    }

    function applyLayoutToDOM(isShift) {
        for (const [code, [lo, hi]] of Object.entries(runtimeLayout)) {
            const id = CODE_TO_ID[code];
            if (!id) continue;
            const el = document.getElementById(id);
            if (!el) continue;
            const char = (isShift ? hi : lo) ?? '';
            el.textContent = char;
            // Larger, brighter label when shifted/caps — helps learners see the character
            if (isShift && char && char !== lo) {
                el.style.fontSize   = '14px';
                el.style.fontWeight = '600';
                el.style.color      = 'var(--txt)';
            } else {
                el.style.fontSize   = '';
                el.style.fontWeight = '';
                el.style.color      = '';
            }
        }
    }

    // applyLayout is called throughout the existing code — wire it here
    function applyLayout(isShift) {
        applyLayoutToDOM(isShift);
    }

    /* ══════════════════════════════════════════════════════
       KEYBOARD LAYOUT DETECTION
       1. KeyboardLayoutMap API  (Chrome/Edge)
       2. Manual calibration fallback (Safari/Firefox/other)
    ══════════════════════════════════════════════════════ */

    const TYPEABLE_CODES = Object.keys(CODE_TO_ID).filter(c => c !== 'Space');

    /* ── Step 1: try the API ──────────────────────────────── */
    async function detectLayout() {
        if (navigator.keyboard?.getLayoutMap) {
            try {
                const map      = await navigator.keyboard.getLayoutMap();
                const detected = { ...FALLBACK_LAYOUT };
                for (const code of TYPEABLE_CODES) {
                    const lo = map.get(code);
                    if (lo && lo !== 'Dead' && lo.length === 1) {
                        detected[code] = [lo, lo.toUpperCase()];
                    }
                }
                applyRuntimeLayout(detected, 'api');
                return;
            } catch (err) {
                console.warn('KeyboardLayoutMap API failed:', err);
            }
        }
        // API unavailable — start manual calibration
        startManualCalib();
    }

    function applyRuntimeLayout(layout, source) {
        runtimeLayout = layout;
        buildCharMap();
        applyLayout(false);
        if (source === 'api' || source === 'calib') {
            // Show the typing area now that layout is known
            document.getElementById('typing-area').style.display = '';
            document.getElementById('pre-calib-msg').style.display = 'none';
        }
        if (source === 'api') showStatus('Розкладку клавіатури визначено автоматично ✓', 3000);
        if (source === 'calib') {
            showStatus('Розкладку збережено ✓', 3000);
            clearKeyHighlights();
            highlightNextKey();
        }
    }

    /* ── Step 2: live calibration — type anything, we learn ── */
    // All typeable codes that need to be discovered
    const CALIB_ALL_CODES = [
        'Backquote','Digit1','Digit2','Digit3','Digit4','Digit5','Digit6','Digit7','Digit8','Digit9','Digit0','Minus','Equal',
        'KeyQ','KeyW','KeyE','KeyR','KeyT','KeyY','KeyU','KeyI','KeyO','KeyP','BracketLeft','BracketRight','Backslash',
        'KeyA','KeyS','KeyD','KeyF','KeyG','KeyH','KeyJ','KeyK','KeyL','Semicolon','Quote',
        'KeyZ','KeyX','KeyC','KeyV','KeyB','KeyN','KeyM','Comma','Period','Slash',
    ];
    const CALIB_TOTAL = CALIB_ALL_CODES.length; // 47 keys, but we only need lowercase pass

    const calib = { active: false, captured: {}, shiftPass: false };

    function startManualCalib() {
        Object.assign(calib, { active: true, captured: {}, shiftPass: false });

        // Show inline calib panel — keyboard stays fully visible below
        document.getElementById('calib-panel').style.display = 'block';
        document.getElementById('calib-instr').innerHTML =
            '<b style="color:var(--txt)">Друкуйте будь-які клавіші</b> — кожна позначиться зеленим. Спочатку без Shift.';
        document.getElementById('calib-bar').style.width = '0%';
        document.getElementById('calib-count').textContent = `0 / ${CALIB_TOTAL}`;
        document.getElementById('calib-phase').textContent = 'Крок 1 — без Shift';

        // Reset any leftover key tints
        CALIB_ALL_CODES.forEach(c => {
            const ke = document.getElementById(CODE_TO_ID[c]);
            if (ke) ke.style.background = '';
        });
    }

    function handleCalibKey(e) {
        if (!calib.active) return;
        e.preventDefault();

        // Ignore modifier keys themselves
        if (['Shift','Control','Meta','Alt','CapsLock'].includes(e.key)) return;

        const code = e.code;
        if (!CALIB_ALL_CODES.includes(code)) return;

        // Enforce: step 1 must be without Shift, step 2 must be with Shift
        if (calib.shiftPass && !e.shiftKey) {
            // Flash red hint on shift keys
            ['shiftleft','shiftright'].forEach(id => {
                const ke = document.getElementById(id);
                if (ke) { ke.classList.add('hit-err'); setTimeout(() => ke.classList.remove('hit-err'), 300); }
            });
            return;
        }
        if (!calib.shiftPass && e.shiftKey) {
            // Flash red hint on shift keys — don't accept shifted input in step 1
            ['shiftleft','shiftright'].forEach(id => {
                const ke = document.getElementById(id);
                if (ke) { ke.classList.add('hit-err'); setTimeout(() => ke.classList.remove('hit-err'), 300); }
            });
            return;
        }

        const slot = calib.shiftPass ? 1 : 0;
        if (!calib.captured[code]) calib.captured[code] = ['', ''];

        const alreadyHad = !!calib.captured[code][slot];
        if (!alreadyHad) {
            calib.captured[code][slot] = e.key.length === 1 ? e.key : '';
        }

        // Mark key green persistently
        const el = document.getElementById(CODE_TO_ID[code]);
        if (el && !alreadyHad) {
            el.classList.add('hit-ok');
            setTimeout(() => {
                el.classList.remove('hit-ok');
                el.style.background  = 'var(--ok-lo)';
                el.style.borderColor = 'var(--ok)';
                el.style.color       = 'var(--ok)';
            }, 180);
        }

        // Count captured keys for current pass
        const doneLo = CALIB_ALL_CODES.filter(c => calib.captured[c]?.[0]).length;
        const doneHi = CALIB_ALL_CODES.filter(c => calib.captured[c]?.[1]).length;
        const done   = calib.shiftPass ? doneHi : doneLo;

        const bar   = document.getElementById('calib-bar');
        const count = document.getElementById('calib-count');
        if (bar)   bar.style.width   = Math.round(done / CALIB_TOTAL * 100) + '%';
        if (count) count.textContent = `${done} / ${CALIB_TOTAL}`;

        if (done >= CALIB_TOTAL) {
            if (!calib.shiftPass) {
                calib.shiftPass = true;
                // Clear all key tints so step 2 starts fresh
                CALIB_ALL_CODES.forEach(c => {
                    const ke = document.getElementById(CODE_TO_ID[c]);
                    if (ke) { ke.style.background = ''; ke.style.borderColor = ''; ke.style.color = ''; }
                });
                if (bar)   bar.style.width   = '0%';
                if (count) count.textContent = `0 / ${CALIB_TOTAL}`;
                const phase = document.getElementById('calib-phase');
                const instr = document.getElementById('calib-instr');
                if (phase) phase.textContent = 'Крок 2 — з ⇧ Shift';
                if (instr) instr.innerHTML   = 'Затисніть <b style="color:var(--txt)">⇧ Shift</b> і пройдіться по тих самих клавішах. Сірі — ще не натиснуті.';
            } else {
                finishCalib();
            }
        }
    }

    function finishCalib() {
        calib.active = false;
        CALIB_ALL_CODES.forEach(c => {
            const ke = document.getElementById(CODE_TO_ID[c]);
            if (ke) { ke.style.background = ''; ke.style.borderColor = ''; ke.style.color = ''; }
        });
        document.getElementById('calib-panel').style.display = 'none';

        const merged = { ...FALLBACK_LAYOUT };
        for (const [code, pair] of Object.entries(calib.captured)) {
            if (pair[0] || pair[1]) merged[code] = pair;
        }

        // Show confirmation before activating — prevents accidental key presses leaking into exercise
        openModal('Калібрування завершено', `
    <div style="text-align:center;padding:8px 0">
      <div style="font-size:32px;margin-bottom:12px">✓</div>
      <div style="font-size:14px;color:var(--txt);font-weight:500;margin-bottom:8px">Розкладку клавіатури збережено</div>
      <div style="font-size:13px;color:var(--txt-2)">Натисніть OK щоб почати вправу.</div>
    </div>
  `);

        // Apply layout only after user clicks OK
        document.querySelector('#modal .btn-primary').onclick = () => {
            closeModal();
            applyRuntimeLayout(merged, 'calib');
            document.querySelector('#modal .btn-primary').onclick = closeModal; // restore default
        };
    }

    // Nav button: force re-detect (API or calib)
    async function openCalibModal() {
        showStatus('Визначаємо розкладку…', 1200);
        await detectLayout();
    }

    /* ══════════════════════════════════════════════════════
       KEYBOARD DOM BUILDER
    ══════════════════════════════════════════════════════ */
    const KB_ROWS = [
        // [id, extraClass]
        [["tilda",""],["1",""],["2",""],["3",""],["4",""],["5",""],
            ["6",""],["7",""],["8",""],["9",""],["0",""],["minus",""],
            ["plus",""],["backspace","wide-2"]],
        [["tab","wide-1"],["Q",""],["W",""],["E",""],["R",""],["T",""],
            ["Y",""],["U",""],["I",""],["O",""],["P",""],["lsc",""],
            ["rsc",""],["bckslash","wide-1"]],
        [["capslock","wide-2"],["A",""],["S",""],["D",""],["F",""],["G",""],
            ["H",""],["J",""],["K",""],["L",""],["ddot",""],["apo",""],
            ["enter","wide-2"]],
        [["shiftleft","wide-3"],["Z",""],["X",""],["C",""],["V",""],["B",""],
            ["N",""],["M",""],["comma",""],["dot",""],["slash",""],
            ["shiftright","wide-2"]],
        [["controlleft","wide-1"],["metaleft",""],["altleft",""],
            ["space","wide-5"],
            ["altright",""],["metaright",""],["menu",""],["controlright","wide-1"]],
    ];

    const KB_LABELS = {
        tilda:"~", backspace:"⌫", tab:"Tab", bckslash:"\\",
        capslock:"Caps", enter:"↵", shiftleft:"⇧", shiftright:"⇧",
        controlleft:"Ctrl", controlright:"Ctrl", metaleft:"⌘", metaright:"⌘",
        altleft:"Alt", altright:"AltGr", menu:"≣", space:"",
        minus:"-", plus:"+", lsc:"[", rsc:"]", ddot:":", apo:"'",
        comma:",", dot:".", slash:"/",
    };

    // Finger assignment per physical key code
    // pinky=л.мізинець  ring=л.підмізинний  middle=л.середній  index=вказівний  thumb=великий
    const FINGER_MAP = {
        // Left pinky
        Backquote:'f-pinky', Digit1:'f-pinky', KeyQ:'f-pinky', KeyA:'f-pinky', KeyZ:'f-pinky',
        // Left ring
        Digit2:'f-ring', KeyW:'f-ring', KeyS:'f-ring', KeyX:'f-ring',
        // Left middle
        Digit3:'f-middle', KeyE:'f-middle', KeyD:'f-middle', KeyC:'f-middle',
        // Left index (covers 2 columns)
        Digit4:'f-index', Digit5:'f-index',
        KeyR:'f-index', KeyT:'f-index',
        KeyF:'f-index', KeyG:'f-index',
        KeyV:'f-index', KeyB:'f-index',
        // Right index (covers 2 columns)
        Digit6:'f-index', Digit7:'f-index',
        KeyY:'f-index', KeyU:'f-index',
        KeyH:'f-index', KeyJ:'f-index',
        KeyN:'f-index', KeyM:'f-index',
        // Right middle
        Digit8:'f-middle', KeyI:'f-middle', KeyK:'f-middle', Comma:'f-middle',
        // Right ring
        Digit9:'f-ring', KeyO:'f-ring', KeyL:'f-ring', Period:'f-ring',
        // Right pinky
        Digit0:'f-pinky', Minus:'f-pinky', Equal:'f-pinky',
        KeyP:'f-pinky', BracketLeft:'f-pinky', BracketRight:'f-pinky', Backslash:'f-pinky',
        Semicolon:'f-pinky', Quote:'f-pinky',
        Slash:'f-pinky',
        // Thumbs
        Space:'f-thumb',
    };

    // Home-row keys (have the tactile bump)
    const HOME_KEYS = new Set(['KeyA', 'KeyJ']); // physical F and J on QWERTY = Ф and О on ЙЦУКЕН

    function buildKeyboard() {
        KB_ROWS.forEach((rowDef, rowIdx) => {
            const rowEl = document.getElementById(`row-${rowIdx}`);
            rowDef.forEach(([id, cls]) => {
                const li = document.createElement('div');
                li.id = id;

                // Find the code for this DOM id (reverse lookup)
                const code = Object.entries(CODE_TO_ID).find(([, v]) => v === id)?.[0];
                const fingerCls = code ? (FINGER_MAP[code] ?? '') : '';
                const homeCls   = code && HOME_KEYS.has(code) ? ' home-key' : '';

                li.className = 'key' + (cls ? ' ' + cls : '') + (fingerCls ? ' ' + fingerCls : '') + homeCls;
                li.textContent = KB_LABELS[id] ?? id;
                rowEl.appendChild(li);
            });
        });
    }

    /* ── Character classification ───────────────────────────────── */
    const isEng = ch => /[a-zA-Z]/.test(ch);
    const isCyr = ch => /[а-яіїєґА-ЯІЇЄҐ]/.test(ch);

    /* ══════════════════════════════════════════════════════
       STATE
    ══════════════════════════════════════════════════════ */
    const state = {
        taskIdx:      0,        // 0-based
        taskText:     '',
        cursor:       0,        // char position
        correct:      0,
        errors:       0,
        lang:         'ua',
        capsOn:       false,
        shiftOn:      false,
        timeStart:    0,
        timeEnd:      0,
        running:      false,
    };

    /* ══════════════════════════════════════════════════════
       CORE LOGIC
    ══════════════════════════════════════════════════════ */
    function startTask(idx) {
        // clamp to valid range
        idx = Math.max(0, Math.min(EXERCISES.length - 1, idx));
        state.taskIdx   = idx;
        state.taskText  = EXERCISES[idx];
        state.cursor    = 0;
        state.correct   = 0;
        state.errors    = 0;
        state.running   = false;
        state.timeStart = 0;
        state.timeEnd   = 0;
        state.lang      = 'ua';
        state.capsOn    = false;

        document.getElementById('lbl-exercise').textContent = LESSON_NAMES[idx] ?? `Вправа ${idx + 1}`;
        document.getElementById('status-msg').textContent = '';

        clearKeyHighlights();
        applyLayout(false);
        renderTask();
        updateStats();
        highlightNextKey();
    }

    function handleCorrectChar() {
        if (!state.running) {
            state.running   = true;
            state.timeStart = Date.now();
        }
        state.correct++;
        state.cursor++;
        renderTask();
        updateStats();

        if (state.cursor >= state.taskText.length) {
            state.timeEnd = Date.now();
            setTimeout(openProgressModal, 300);
        } else {
            highlightNextKey();
        }
    }

    function handleWrongChar(typed, expected) {
        state.errors++;
        updateStats();

        if (typed.toLowerCase() === expected.toLowerCase()) {
            showStatus('Змініть регістр символів!');
        } else if (isEng(typed) && isCyr(expected) || isCyr(typed) && isEng(expected)) {
            showStatus('Змініть розкладку клавіатури!');
        }
    }

    /* ══════════════════════════════════════════════════════
       RENDER
    ══════════════════════════════════════════════════════ */
    function renderTask() {
        const text = state.taskText;
        const cur  = state.cursor;
        const el   = document.getElementById('task-render');

        // Show a sliding window: ~30 chars before cursor, rest after
        const win    = 80;
        const start  = Math.max(0, cur - 30);
        const end    = Math.min(text.length, start + win);
        const slice  = text.slice(start, end);

        el.innerHTML = slice.split('').map((ch, i) => {
            const abs = start + i;
            const display = ch === ' ' ? '&nbsp;' : ch;
            if (abs < cur)       return `<span class="done">${display}</span>`;
            if (abs === cur)     return `<span class="cursor">${display}</span>`;
            return `<span class="ahead">${display}</span>`;
        }).join('');

        // Progress bar
        const pct = text.length > 0 ? (cur / text.length * 100).toFixed(1) : 0;
        document.getElementById('progress-fill').style.width = pct + '%';
    }

    function updateStats() {
        const elapsed = state.timeStart
            ? ((state.timeEnd || Date.now()) - state.timeStart) / 1000
            : 0;

        const speed = elapsed > 0 ? Math.round(state.correct / elapsed * 60) : 0;
        const total = state.correct + state.errors;
        const acc   = total > 0 ? Math.round(state.correct / total * 100) : '—';

        document.getElementById('stat-speed').textContent   = speed;
        document.getElementById('stat-acc').textContent     = total > 0 ? acc + '%' : '—';
        document.getElementById('stat-correct').textContent = state.correct;
        document.getElementById('stat-errors').textContent  = state.errors;
    }

    /* ══════════════════════════════════════════════════════
       KEY HIGHLIGHT
    ══════════════════════════════════════════════════════ */
    function clearKeyHighlights() {
        document.querySelectorAll('.key.selected').forEach(el => el.classList.remove('selected'));
    }

    function highlightNextKey() {
        clearKeyHighlights();
        const ch = state.taskText[state.cursor];
        if (!ch) return;

        state.lang = isEng(ch) ? 'eng' : 'ua';
        applyLayout(isUppercase());

        const id = getKeyId(ch);
        const el = document.getElementById(id);
        if (el) el.classList.add('selected');
    }

    function flashKey(id, ok) {
        const el = document.getElementById(id);
        if (!el) return;
        const cls = ok ? 'hit-ok' : 'hit-err';
        el.classList.add(cls);
        setTimeout(() => el.classList.remove(cls), 180);
    }

    /* ══════════════════════════════════════════════════════
       STATUS
    ══════════════════════════════════════════════════════ */
    let statusTimer = null;
    function showStatus(msg, duration = 2000) {
        clearTimeout(statusTimer);
        document.getElementById('status-msg').textContent = msg;
        statusTimer = setTimeout(() => {
            document.getElementById('status-msg').textContent = '';
        }, duration);
    }

    /* ══════════════════════════════════════════════════════
       KEYBOARD EVENTS
    ══════════════════════════════════════════════════════ */

    // Single source of truth: are keys currently showing uppercase?
    function isUppercase() {
        return state.shiftOn !== state.capsOn; // XOR: shift alone, caps alone → upper; both → lower
    }

    document.addEventListener('keydown', e => {
        const active = document.activeElement;
        if (active.id === 'inp-name' || active.id === 'inp-surname') return;
        if (calib.active) { handleCalibKey(e); return; }

        if (e.key === 'Shift') {
            state.shiftOn = true;
            applyLayout(isUppercase());
            const shiftId = e.code === 'ShiftLeft' ? 'shiftleft' : 'shiftright';
            document.getElementById(shiftId)?.classList.add('selected');
        }

        if (e.key === 'CapsLock') {
            state.capsOn = !state.capsOn;
            applyLayout(isUppercase());
        }
    });

    document.addEventListener('keyup', e => {
        const active = document.activeElement;
        if (active.id === 'inp-name' || active.id === 'inp-surname') return;
        if (calib.active) { e.preventDefault(); return; }  // block typing during calib
        if (e.key === 'GroupNext') return;

        // Special / modifier keys — ignore for typing
        const IGNORE = ['Shift','Control','Meta','Alt','AltGraph','Enter',
            'Tab','Backspace','CapsLock','ArrowLeft','ArrowRight',
            'ArrowUp','ArrowDown','Escape'];

        if (e.key === 'Shift') {
            state.shiftOn = false;
            applyLayout(isUppercase());
            document.querySelectorAll('#shiftleft, #shiftright')
                .forEach(el => el.classList.remove('selected'));
            return;
        }

        if (IGNORE.includes(e.key)) return;

        const keyId   = getKeyId(e.key);
        const expected = state.taskText[state.cursor];
        const correct  = (e.key === expected);

        flashKey(keyId, correct);

        if (correct) {
            clearKeyHighlights();
            handleCorrectChar();
        } else {
            handleWrongChar(e.key, expected);
        }
    });

    /* ══════════════════════════════════════════════════════
       SCORING
    ══════════════════════════════════════════════════════ */
    function calcGrade(speed, accuracy) {
        let pts = 0;

        if      (accuracy > 98) pts += 6;
        else if (accuracy > 95) pts += 5;
        else if (accuracy > 90) pts += 4;
        else if (accuracy > 85) pts += 3;
        else if (accuracy > 80) pts += 2;
        else if (accuracy > 70) pts += 1;

        if      (speed > 160) pts += 6;
        else if (speed > 140) pts += 5;
        else if (speed > 120) pts += 4;
        else if (speed > 100) pts += 3;
        else if (speed > 80)  pts += 2;
        else if (speed > 60)  pts += 1;

        return pts;
    }

       TELEGRAM

    function sendToTelegram(text) {
        fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: TG_CHAT_ID, text }),
        }).catch(console.error);
    }

    function openProgressModal() {

        const secs   = Math.floor(elapsed % 60);
        const speed  = elapsed > 0 ? Math.round(state.correct / elapsed * 60) : 0;
        const total  = state.correct + state.errors;
        const acc    = total > 0 ? Math.round(state.correct / total * 100) : 0;
        const grade  = calcGrade(speed, acc);

        const name    = document.getElementById('inp-name').value;
        const surname = document.getElementById('inp-surname').value;

        sendToTelegram(
            `${LESSON_NAMES[state.taskIdx]} | ${surname} ${name}\n` +

      <div class="result-cell"><div class="big">${state.correct}</div><div class="sm">правильно</div></div>
    </div>
    <div style="text-align:center">
      <span class="grade-badge">${grade} балів</span>
    </div>
  `);
    }
